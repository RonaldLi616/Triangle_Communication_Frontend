<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity 互動控制器</title>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        /* 基礎樣式：讓按鈕充滿螢幕且不可滾動 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 防止捲動 */
            touch-action: none; /* 禁用預設手勢 */
            transition: background-color 0.3s ease; /* 平滑過渡背景色 */
        }

        .flash-white {
            background-color: #ffffff !important;
            transition: none; /* 立即變色，無過渡 */
        }

        .flash-yellow {
            background-color: #f1c40f !important;
            transition: none; /* 立即變色，無過渡 */
        }

        .flash-green {
            background-color: #2ed573 !important;
            transition: none; /* 立即變色，無過渡 */
        }

        #status-light {
            width: 12px; height: 12px; border-radius: 50%; background: #ff4757; margin-bottom: 10px;
        }

        .main-button {
            width: 250px;
            height: 250px;
            background: linear-gradient(145deg, #1e90ff, #3742fa);
            border-radius: 50%;
            border: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* 移除行動端點擊高亮 */
        }

        .main-button:active {
            transform: scale(0.92);
            background: #2f3542;
        }
    </style>
</head>
<body>

    <div id="status-light"></div>
    <div id="status-text">正在等待連線...</div>
    
    <br><br>

    <button class="main-button" id="interactBtn">
        按我互動！
    </button>

    <button id="startBtn" style="padding: 20px; font-size: 20px;">
        點擊開始 (啟動感應器)
    </button>

    <script>
        // 這裡稍後會加入 JavaScript 通訊邏輯
        // 1. 初始化連線
        // 這裡的網址是你部署在 Render 或 Heroku 的後端網址
        const socket = io("https://triangle-communication.onrender.com", {
            transports: ["websocket"], // 強制使用 WebSocket 減少延遲
            reconnection: true,        // 啟用自動重連
            reconnectionAttempts: 5,   // 斷線後嘗試重連次數
            forceNew: true,           // 強制建立新連線，避免重複使用舊連線導致問題
            timeout: 10000            // 連線超時設定（10秒）避免無限等待
        });

        // 2. 監聽連線事件 (用於給觀眾視覺反饋)
        socket.on("connect", () => {
            console.log("連線成功，分配到的 ID: " + socket.id);
            document.getElementById("status-text").innerText = "已成功連線至大螢幕";
            document.getElementById("status-light").style.backgroundColor = "#2ed573";
        });

        socket.on("connect_error", (error) => {
            document.getElementById("status-text").innerText = "連線失敗，請檢查網路";
            document.getElementById("status-light").style.backgroundColor = "#ff4757";
        });

        const btn = document.getElementById('interactBtn');

        // 3. 監聽按鈕事件，發送指令給 Unity
        btn.addEventListener('touchstart', (e) => {
            // 防止瀏覽器預設行為（如長按跳出菜單或縮放）
            e.preventDefault(); 

            triggerFlash('flash-white'); // 觸發閃爍效果
            // 觸發手機震動 (增加手感)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }

            // 發送指令給伺服器
            // "playerAction" 是你自己定義的事件名稱，Unity 端也要監聽這個名字
            if (!socket.connected) {
                alert("還在連線中，請稍等一秒...");
                return;
            }
            socket.emit("playerAction", {
                id: socket.id,      // 告訴 Unity 是誰按的
                action: "JUMP",     // 動作類型
                timestamp: Date.now() // (選填) 用於計算延遲
            });
        }, { passive: false }); // passive: false 允許 preventDefault()

        const colorClass = 'flash-white'; // 預設閃爍顏色類別
        function triggerFlash() {
            const body = document.body;
            
            if (!colorClass) return; // 如果沒有指定顏色類別，直接返回

            // 1. 強制加入閃爍類別
            body.classList.add(colorClass);
            
            // 2. 使用極短的延遲後移除類別，觸發 CSS 的 transition 回到黑色
            setTimeout(() => {
                body.classList.remove(colorClass);
            }, 50); // 50毫秒後開始退色
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            startShakeDetection();
            this.style.display = 'none'; // 點擊後隱藏按鈕
        });

        // Check for device motion support
        function startShakeDetection() {
            // 檢查瀏覽器是否支援 DeviceMotionEvent
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                // iOS 13+ 特有流程
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            // 修正：移除註解，並先移除舊的監聽器防止重複
                            window.removeEventListener('devicemotion', handleShake);
                            window.addEventListener('devicemotion', handleShake);
                            console.warn("iOS 加速度權限已允許");
                        } else {
                            alert("請允許運動感應權限以參與搖晃互動！");
                        }
                    })
                    .catch(err => {
                        console.error("權限請求出錯:", err);
                    });
            } else {
                // Android 或 PC 測試環境
                window.removeEventListener('devicemotion', handleShake);
                window.addEventListener('devicemotion', handleShake);
                console.warn("非 iOS 環境，直接啟動監聽");
            }
        }

        let lastX = 0, lastY = 0, lastZ = 0;
        let moveCounter = 0;
        function handleShake(event) {
            let acc = event.accelerationIncludingGravity;
            if(!acc) return;
            
            let deltaX = Math.abs(lastX - acc.x);
            let deltaY = Math.abs(lastY - acc.y);
            let deltaZ = Math.abs(lastZ - acc.z);

            // 閾值設定：15~25 之間通常比較靈敏且不易誤觸
            const threshold = 20; 
            if (deltaX + deltaY + deltaZ > threshold) {
                moveCounter++;
            } else {
                moveCounter = Math.max(0, moveCounter - 1);
            }

            // 當連續偵測到幾次大幅度晃動，判定為「搖晃」
            if (moveCounter > 2) {
                console.log("偵測到搖晃！");
                sendShakeData();
                moveCounter = 0; // 重置計數
            }

            lastX = acc.x;
            lastY = acc.y;
            lastZ = acc.z;
        }

        function sendShakeData() {
            triggerFlash('flash-yellow'); // 觸發閃爍效果
            if(window.navigator.vibrate) {
                window.navigator.vibrate([100, 50, 100]); // 震動模式：震動-停頓-震動
            }
            socket.emit('playerAction', {
                action: "SHAKE",
                timestamp: Date.now()
            });
        }

    </script>
</body>
</html>
